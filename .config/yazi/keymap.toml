[[mgr.prepend_keymap]]
on = "<A-Left>"
run = "plugin toggle-pane min-parent"
desc = "Toggle parent panel"

[[mgr.prepend_keymap]]
on = "<A-Right>"
run = "plugin toggle-pane min-preview"
desc = "Toggle preview panel"

[[mgr.prepend_keymap]]
on = "<A-Up>"
run = "plugin toggle-pane min-current"
desc = "Toggle current panel"

[[mgr.prepend_keymap]]
on = "<A-c>"
run = "shell 'code .' --orphan"
desk = "Open current directory in VS Code"

[[mgr.prepend_keymap]]
on = "<A-t>"
run = "shell 'kitty .' --orphan"
desk = "Open current directory in Kitty"

[[mgr.prepend_keymap]]
on = "<C-M>"
run = "plugin mount"
desc = "show mounting menu"

[[mgr.prepend_keymap]]
on = "<C-c>"
run = ["yank", "plugin clipboard -- copy"]
desc = "Copy selection to system clipboard"

[[mgr.prepend_keymap]]
on = "<C-f>"
run = "filter --smart"
desc = "find files and folders"

[[mgr.prepend_keymap]]
on = "<C-h>"
run = "hidden toggle"
desc = "show/hide hidden files and folders"

[[mgr.prepend_keymap]]
on = "<C-n>"
run = "create"
desc = "create files"

[[mgr.prepend_keymap]]
on = "<C-v>"
run = ["paste", "plugin clipboard -- paste"]
desc = "Paste (yanked if available, else cross-window)"

[[mgr.prepend_keymap]]
on = "<C-x>"
run = ["yank --cut", "plugin clipboard -- cut"]
desc = "Cut selection via system clipboard"

[[mgr.prepend_keymap]]
on = "<Delete>"
run = "remove"
desc = "delete"

[[mgr.prepend_keymap]]
on = "<F2>"
run = "rename"
desc = "rename files and folders"

[[mgr.prepend_keymap]]
on = "<S-Down>"
run = "arrow bot"
desc = "Move to bottom"

[[mgr.prepend_keymap]]
on = "<S-Right>"
run = 'shell "kitty --directory \"$1\" yazi" --orphan'
desc = "Open directory in new window"

[[mgr.prepend_keymap]]
on = "<S-Up>"
run = "arrow top"
desc = "Move to top"

[[mgr.prepend_keymap]]
on = ["R", "D"]
run = "plugin recycle-bin -- emptyDays"
desc = "Empty by days deleted"

[[mgr.prepend_keymap]]
on = ["R", "d"]
run = "plugin recycle-bin -- delete"
desc = "Delete from Trash"

[[mgr.prepend_keymap]]
on = ["R", "e"]
run = "plugin recycle-bin -- empty"
desc = "Empty Trash"

[[mgr.prepend_keymap]]
on = ["R", "o"]
run = "plugin recycle-bin -- open"
desc = "Open Trash"

[[mgr.prepend_keymap]]
on = ["R", "r"]
run = "plugin recycle-bin -- restore"
desc = "Restore from Trash"

[[mgr.prepend_keymap]]
on = ["R", "u"]
run = "plugin restore"
desc = "Restore last deleted files/folders"

[[mgr.prepend_keymap]]
on = ["c", "a", "a"]
run = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = ["c", "a", "h"]
run = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on = ["c", "a", "l"]
run = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on = ["c", "a", "p"]
run = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on = ["c", "a", "u"]
run = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on = "p"
run = "visual_mode"
desc = "Enter visual mode"
